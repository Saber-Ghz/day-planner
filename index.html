<!-- V8.2 neutral search centered modal -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

:root{
  --fnt:-apple-system,"SF Pro Text","SF Pro Display","Helvetica Neue",Arial,sans-serif;
  --pt:#000000;--st:#6C6C70;--tt:#AEAEB2;
  --bg:#F2F2F7;--bg2:#FFFFFF;--bg3:rgba(118,118,128,.12);
  --bd:rgba(60,60,67,.18);--bd2:rgba(60,60,67,.28);
  --inf:#007AFF;--inf-bg:rgba(0,122,255,.08);
  --suc:#34C759;--suc-bg:rgba(52,199,89,.1);
  --dan:#FF3B30;--dan-bg:rgba(255,59,48,.1);
  --war:#FF9500;--war-bg:rgba(255,149,0,.1);
  --r:10px;--rl:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.04);
}
@media(prefers-color-scheme:dark){
  :root{
    --pt:#FFFFFF;--st:rgba(235,235,245,.6);--tt:rgba(235,235,245,.3);
    --bg:#000000;--bg2:#1C1C1E;--bg3:rgba(118,118,128,.24);
    --bd:rgba(84,84,88,.6);--bd2:rgba(84,84,88,.8);
    --inf:#0A84FF;--inf-bg:rgba(10,132,255,.15);
    --suc:#30D158;--suc-bg:rgba(48,209,88,.15);
    --dan:#FF453A;--dan-bg:rgba(255,69,58,.15);
    --war:#FF9F0A;--war-bg:rgba(255,159,10,.15);
    --shadow:none;
  }
}
/* Manual overrides */
:root[style*="color-scheme: dark"]{
  --pt:#FFFFFF;--st:rgba(235,235,245,.6);--tt:rgba(235,235,245,.3);
  --bg:#000000;--bg2:#1C1C1E;--bg3:rgba(118,118,128,.24);
  --bd:rgba(84,84,88,.6);--bd2:rgba(84,84,88,.8);
  --inf:#0A84FF;--inf-bg:rgba(10,132,255,.15);
  --suc:#30D158;--suc-bg:rgba(48,209,88,.15);
  --dan:#FF453A;--dan-bg:rgba(255,69,58,.15);
  --war:#FF9F0A;--war-bg:rgba(255,159,10,.15);
  --shadow:none;
}
:root[style*="color-scheme: light"]{
  --pt:#000000;--st:#6C6C70;--tt:#AEAEB2;
  --bg:#F2F2F7;--bg2:#FFFFFF;--bg3:rgba(118,118,128,.12);
  --bd:rgba(60,60,67,.18);--bd2:rgba(60,60,67,.28);
  --inf:#007AFF;--inf-bg:rgba(0,122,255,.08);
  --suc:#34C759;--suc-bg:rgba(52,199,89,.1);
  --dan:#FF3B30;--dan-bg:rgba(255,59,48,.1);
  --war:#FF9500;--war-bg:rgba(255,149,0,.1);
  --shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.04);
}

html,body{background:var(--bg);color:var(--pt);font-family:var(--fnt);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased}

/* iOS Segmented Control */
.tabs{display:flex;gap:0;background:var(--bg3);border-radius:9px;padding:2px;width:fit-content}
.tab{padding:5px 14px;border:none;background:none;font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;color:var(--pt);font-family:var(--fnt);transition:all .2s;display:inline-flex;align-items:center;gap:5px;opacity:.7;white-space:nowrap}
.tab:hover{opacity:.9}
.tab.on{background:var(--bg2);box-shadow:0 1px 4px rgba(0,0,0,.12),0 .5px 1px rgba(0,0,0,.08);opacity:1}
@media(prefers-color-scheme:dark){.tab.on{background:#3A3A3C;box-shadow:0 1px 3px rgba(0,0,0,.4)}}

/* Nav buttons — iOS blue */
.nnb{border:none;background:none;cursor:pointer;color:var(--inf);padding:4px 8px;border-radius:8px;display:inline-flex;align-items:center;transition:all .15s}
.nnb:hover{background:var(--inf-bg)}

/* Date */
.ph{font-size:26px;font-weight:700;color:var(--pt);line-height:1.15;letter-spacing:-.03em}
.pmeta{font-size:13px;color:var(--st);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center}

/* Progress — thicker iOS pill */
.prog{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:14px 0 20px}
.progf{height:100%;border-radius:4px;background:var(--inf);transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Section headers — iOS ALL CAPS style */
.sh{font-size:11px;font-weight:600;color:var(--st);margin:22px 0 6px 4px;display:flex;align-items:center;gap:5px;padding:0;letter-spacing:.06em;text-transform:uppercase}
.sh-toggle{cursor:pointer;user-select:none;border-radius:6px;padding:2px 4px;margin-left:-4px;transition:background .12s}
.sh-toggle:hover{background:var(--bg3);color:var(--pt)}
.col-chevron{margin-left:auto;display:inline-flex;align-items:center;transition:transform .2s cubic-bezier(.4,0,.2,1)}

/* Task card — iOS inset grouped list */
.dzone:has(*)>:first-child .block,
.dzone:has(*)>:first-child .goalbk{border-top-left-radius:var(--rl);border-top-right-radius:var(--rl)}
.dzone:has(*)>:last-child .block,
.dzone:has(*)>:last-child .goalbk{border-bottom-left-radius:var(--rl);border-bottom-right-radius:var(--rl)}
.dzone:has(*){background:var(--bg2);border-radius:var(--rl);box-shadow:var(--shadow)}

/* Separator between rows */
[data-did]+[data-did] .block,[data-did]+[data-did] .goalbk{border-top:.5px solid var(--bd)}

/* Task row */
.block{display:flex;align-items:center;gap:8px;padding:10px 14px;min-height:44px;position:relative;margin:0;border-radius:0;background:transparent}
.block:hover{background:rgba(0,0,0,.03)}
@media(prefers-color-scheme:dark){.block:hover{background:rgba(255,255,255,.05)}}

/* Drag handle */
.dh{opacity:0;color:var(--tt);cursor:grab;flex-shrink:0;touch-action:none;transition:opacity .12s;background:none;border:none;padding:2px;display:inline-flex;align-items:center;border-radius:6px}
.block:hover .dh,.goalbk:hover .dh{opacity:1}

/* Checkbox */
.block input[type=checkbox],.goalbk input[type=checkbox]{width:20px;height:20px;cursor:pointer;flex-shrink:0;accent-color:var(--inf);margin:0}

/* Text */
.btxt{flex:1;font-size:15px;line-height:1.4;min-width:0;cursor:text;padding:0 4px;color:var(--pt);word-break:break-word}
.btxt.done{text-decoration:line-through;color:var(--tt)}
.binp{font-size:15px;border:none;background:transparent;color:var(--pt);outline:none;padding:0 4px;min-width:0;line-height:1.4;flex:1;font-family:var(--fnt);width:100%}

/* Action buttons */
.bacts,.gacts{opacity:0;display:flex;gap:1px;flex-shrink:0;transition:opacity .1s;position:relative}
.block:hover .bacts,.goalbk:hover .gacts{opacity:1}
.bact{border:none;background:none;cursor:pointer;color:var(--tt);padding:4px 6px;border-radius:6px;display:inline-flex;align-items:center;transition:all .1s}
.bact:hover{background:var(--bg3);color:var(--st)}

/* Priority tags — iOS pill style */
.ptag{font-size:12px;padding:2px 9px;border-radius:20px;font-weight:600;flex-shrink:0;line-height:1.5;white-space:nowrap}
.ptag.high{background:var(--dan-bg);color:var(--dan)}
.ptag.med{background:var(--war-bg);color:var(--war)}
.ptag.low{background:var(--suc-bg);color:var(--suc)}

/* Inline add — extends card visually */
.add-inline{display:flex;align-items:center;gap:8px;padding:10px 14px;min-height:44px;background:var(--bg2);border-radius:var(--rl);box-shadow:var(--shadow);margin-top:2px}
.dzone:has(*)+.add-inline{border-top-left-radius:0;border-top-right-radius:0;border-top:.5px solid var(--bd);margin-top:0}
.add-inline input{font-size:15px;border:none;background:transparent;color:var(--pt);outline:none;padding:0 4px;flex:1;font-family:var(--fnt);line-height:1.4}
.add-inline input::placeholder{color:var(--tt)}

/* Add button */
.add-line{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:var(--r);cursor:pointer;color:var(--inf);font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:left;font-family:var(--fnt);min-height:40px;transition:all .15s;margin:0}
.add-line:hover{background:var(--inf-bg)}

/* Hover reveal */
@media(hover:hover){
  .sec-wrap .add-line,.bcol .add-line{opacity:0}
  .sec-wrap:hover .add-line,.bcol:hover .add-line{opacity:1}
}

/* Notes */
.n-ta{font-size:15px;background:none;color:var(--st);border:none;outline:none;display:block;width:100%;resize:none;min-height:80px;line-height:1.7;padding:2px 0;font-family:var(--fnt)}
.n-ta:focus{color:var(--pt)}
.n-ta::placeholder{color:var(--tt)}

/* Picker pills */
.ppick{display:flex;gap:4px;margin:8px 0}
.ppill{font-size:12px;border:1.5px solid var(--bd2);background:none;color:var(--st);border-radius:20px;padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:4px;flex:1;justify-content:center;font-weight:600;font-family:var(--fnt);transition:all .1s}
.ppill:hover{background:var(--bg3)}
.pbtn{font-size:14px;font-weight:600;background:var(--inf);color:#fff;border:none;border-radius:10px;padding:8px 18px;cursor:pointer;font-family:var(--fnt);transition:opacity .1s}
.pbtn:hover{opacity:.85}
.sbtn{font-size:14px;background:none;color:var(--st);border:1.5px solid var(--bd2);border-radius:10px;padding:7px 14px;cursor:pointer;font-family:var(--fnt)}
.sbtn:hover{background:var(--bg3)}

/* Context menu — iOS popover */
.cmenu{position:absolute;right:0;top:calc(100% + 8px);border-radius:14px;z-index:300;min-width:200px;padding:6px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.cmenu{background:rgba(255,255,255,.92);box-shadow:0 8px 32px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){.cmenu{background:rgba(44,44,46,.95);box-shadow:0 8px 32px rgba(0,0,0,.6)}}
.cmi{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:9px;cursor:pointer;font-size:14px;color:var(--pt);border:none;background:none;width:100%;text-align:left;font-family:var(--fnt);transition:background .1s}
.cmi:hover{background:var(--bg3)}
.cmi.danger{color:var(--dan)}
.cmi.danger:hover{background:var(--dan-bg)}
.cmsep{height:.5px;background:var(--bd);margin:4px 0}
.priorow{display:flex;gap:6px;padding:4px 8px 8px}
.popt{font-size:12px;padding:5px 8px;border-radius:20px;cursor:pointer;font-weight:600;border:none;flex:1;text-align:center;font-family:var(--fnt);transition:all .1s}

/* Divider */
.ndiv{height:.5px;background:var(--bd);margin:24px 0}

/* Chips */
.schip{font-size:12px;color:var(--st);background:var(--bg3);padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;font-weight:500}

/* Weekly grid */
.wcols{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-bottom:20px}
.bcol{border-radius:14px;background:var(--bg2);padding:10px 8px;min-height:60px;border:none;box-shadow:var(--shadow)}
.bcol.today-col{background:var(--inf-bg);box-shadow:0 0 0 1.5px var(--inf)}
.bcard{background:var(--bg3);border:none;border-radius:8px;padding:6px 8px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.bcard:hover{opacity:.7}

/* Goal blocks */
.goalbk{display:flex;align-items:center;gap:8px;padding:10px 14px;min-height:44px;margin:0;border-radius:0;background:transparent}
.goalbk:hover{background:rgba(0,0,0,.03)}
@media(prefers-color-scheme:dark){.goalbk:hover{background:rgba(255,255,255,.05)}}

/* Drop zones */
.dzone{min-height:4px;border-radius:var(--rl)}

/* Move panel */
.mpanel{background:var(--bg2);border:none;border-radius:14px;padding:12px 14px;margin:4px 0 6px 22px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
@media(prefers-color-scheme:dark){.mpanel{background:#2C2C2E;box-shadow:0 4px 20px rgba(0,0,0,.5)}}
.daybtn{font-size:10px;border:none;background:var(--bg3);color:var(--st);border-radius:8px;padding:6px 4px;cursor:pointer;text-align:center;flex:1;font-family:var(--fnt);font-weight:500;transition:all .15s}
.daybtn:hover{background:var(--inf);color:#fff}
.daybtn.cur{opacity:.3;cursor:default;pointer-events:none}
.daybtn.tod{background:var(--inf-bg);color:var(--inf);font-weight:700}

/* Saved */
#svind{font-size:12px;color:var(--suc);transition:opacity .4s;opacity:0;font-weight:600;display:inline-flex;align-items:center;gap:3px}

/* Task done animation */
@keyframes taskDone{0%{background:rgba(52,199,89,.22)}100%{background:transparent}}
.just-done{animation:taskDone .6s ease-out forwards}

/* Notes card */
.notes-card{background:var(--bg2);border-radius:var(--rl);box-shadow:var(--shadow);padding:12px 14px;margin-top:4px}

/* Date picker */
.date-tap{position:relative;display:inline-block;cursor:pointer;text-align:center}
.date-tap input[type=date]{position:absolute;inset:0;opacity:0;width:100%;cursor:pointer;font-size:16px}

/* v3 productivity helpers */
.topbtn{border:none;background:var(--bg3);cursor:pointer;border-radius:20px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--st);font-family:var(--fnt);display:inline-flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.topbtn:hover{background:var(--inf-bg);color:var(--inf)}
.topbtn:disabled{opacity:.35;cursor:default;background:var(--bg3)!important;color:var(--st)!important}
.topbtn.on{background:var(--inf-bg);color:var(--inf)}
.quickbar{display:flex;gap:8px;align-items:center;background:var(--bg2);border-radius:16px;box-shadow:var(--shadow);padding:10px 12px;margin:0 0 18px}
.quickbar input{border:none;background:transparent;color:var(--pt);font-size:15px;outline:none;font-family:var(--fnt);flex:1;min-width:0}
.quickbar input::placeholder{color:var(--tt)}
.quick-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.qbtn{border:none;border-radius:12px;padding:8px 12px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--fnt);white-space:nowrap}
.qbtn.high{background:var(--dan-bg);color:var(--dan)}
.qbtn.med{background:var(--war-bg);color:var(--war)}
.qbtn.low{background:var(--suc-bg);color:var(--suc)}
.qbtn:hover{filter:brightness(.97)}
.focus-card{background:linear-gradient(135deg,var(--inf-bg),transparent);border:1px solid var(--bd);border-radius:18px;padding:12px 14px;margin:0 0 14px;box-shadow:var(--shadow)}
.focus-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:.5px solid var(--bd)}
.focus-row:first-of-type{border-top:none}
.carried-pill,.repeat-pill,.focus-pill{font-size:10px;font-weight:700;border-radius:20px;padding:2px 7px;white-space:nowrap;background:var(--bg3);color:var(--st)}
.focus-pill{background:var(--inf-bg);color:var(--inf)}
.eod-card,.backup-card,.modal-card{background:var(--bg2);border-radius:18px;box-shadow:var(--shadow);padding:14px;margin:12px 0;border:1px solid var(--bd)}
.backup-card{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--war-bg)}
.search-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:9998;display:flex;align-items:flex-start;justify-content:center;padding:70px 16px 16px}
.search-modal{width:min(640px,100%);max-height:80vh;overflow:auto;background:var(--bg2);border-radius:20px;box-shadow:0 18px 60px rgba(0,0,0,.28);padding:14px;border:1px solid var(--bd)}
.search-modal input,.modal-card input,.modal-card select,.modal-card textarea{width:100%;border:1px solid var(--bd2);border-radius:12px;background:var(--bg);color:var(--pt);font-size:15px;font-family:var(--fnt);padding:10px;outline:none;margin-top:8px}
.search-result{display:block;width:100%;text-align:left;border:none;background:transparent;color:var(--pt);padding:10px;border-radius:12px;cursor:pointer;font-family:var(--fnt);border-bottom:.5px solid var(--bd)}
.search-result:hover{background:var(--bg3)}
.small-muted{font-size:12px;color:var(--st)}
@media(max-width:700px){.planner-top{flex-direction:column;align-items:stretch!important;gap:10px}.planner-actions{flex-wrap:wrap}.tabs{width:100%;display:grid;grid-template-columns:repeat(3,1fr)}.tab{justify-content:center}}


/* v6 cleaner UX */
.planner-top{position:sticky;top:0;z-index:50;background:linear-gradient(var(--bg) 78%,rgba(242,242,247,0));padding-top:8px;padding-bottom:10px;margin-bottom:1rem!important;gap:12px}
@media(prefers-color-scheme:dark){.planner-top{background:linear-gradient(var(--bg) 78%,rgba(0,0,0,0))}}
.planner-actions{flex-wrap:nowrap!important;gap:6px!important}
.topbtn.icon-only{width:34px;height:34px;justify-content:center;padding:0;border-radius:999px;font-size:14px}
.search-btn{padding:7px 12px!important;border-radius:999px!important;font-size:13px!important;font-weight:700!important;color:var(--st)!important;background:var(--bg3)!important;gap:6px!important}
.search-btn svg{color:var(--st)!important}
.search-btn:hover{background:var(--bg2)!important;color:var(--pt)!important;filter:none}
.search-btn:hover svg{color:var(--pt)!important}
.more-wrap{position:relative}
.more-menu{position:absolute;right:0;top:42px;width:210px;background:var(--bg2);border:1px solid var(--bd);border-radius:16px;box-shadow:0 16px 45px rgba(0,0,0,.18);padding:6px;z-index:500}
.more-menu .cmi{font-size:13px;padding:10px}
.summary-card{display:flex;align-items:center;justify-content:center;gap:7px;margin:-2px 0 14px;color:var(--st);font-size:13px;font-weight:650;line-height:1.2}
.sum-item{display:inline-flex;align-items:center;gap:4px;background:transparent;border:none;padding:0;text-align:center}
.sum-item:not(:last-child)::after{content:'·';color:var(--tt);margin-left:7px;font-weight:700}
.sum-num{font-size:13px;font-weight:800;color:var(--pt);line-height:1}
.sum-lab{font-size:13px;font-weight:650;color:var(--st);text-transform:none;letter-spacing:0;margin-top:0}
.summary-card.is-simple .sum-item:not(:first-child){display:none}
.carried-card{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;box-shadow:var(--shadow);padding:0;margin:0 0 14px;overflow:hidden}
.carried-card .sh{margin:10px 14px 8px}
.starbtn{border:none;background:none;color:var(--tt);cursor:pointer;width:26px;height:26px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:18px;line-height:1;flex-shrink:0}
.starbtn.on{color:var(--inf);background:var(--inf-bg)}
.starbtn:hover{background:var(--bg3);color:var(--inf)}
.row-actions{opacity:0;display:flex;gap:2px;align-items:center;transition:opacity .1s;flex-shrink:0}
.block:hover .row-actions,.goalbk:hover .row-actions{opacity:1}
.fab{position:fixed;right:28px;bottom:28px;width:58px;height:58px;border:none;border-radius:999px;background:var(--inf);color:white;box-shadow:0 12px 36px rgba(0,122,255,.35);font-size:30px;font-weight:500;cursor:pointer;z-index:700;display:flex;align-items:center;justify-content:center;line-height:1;transition:transform .12s,opacity .12s}
.fab:hover{transform:translateY(-2px)}
.add-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.26);z-index:9998;display:flex;align-items:center;justify-content:center;padding:16px}
.add-modal{width:min(520px,100%);background:var(--bg2);border:1px solid var(--bd);border-radius:24px;box-shadow:0 20px 70px rgba(0,0,0,.28);padding:16px;transform:translateY(-4vh)}
.add-modal input{width:100%;border:1px solid var(--bd2);border-radius:16px;background:var(--bg);color:var(--pt);font-size:18px;font-family:var(--fnt);padding:14px;outline:none;margin:8px 0 12px}
.add-prio-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.add-prio-row .qbtn{padding:12px 8px;border-radius:16px;font-size:14px}
.add-where{display:flex;gap:6px;margin-bottom:10px;background:var(--bg3);border-radius:14px;padding:3px}
.add-where button{flex:1;border:none;background:transparent;color:var(--st);font-family:var(--fnt);font-size:12px;font-weight:800;border-radius:11px;padding:8px;cursor:pointer}
.add-where button.on{background:var(--bg2);color:var(--inf);box-shadow:var(--shadow)}
.empty-day{background:var(--bg2);border-radius:18px;border:1px dashed var(--bd2);padding:22px;text-align:center;color:var(--st);margin:12px 0}
@media(max-width:700px){.planner-top{position:static}.planner-actions{justify-content:flex-end}.topbtn.clean-label{display:none}.search-btn span{display:none}.search-btn{width:38px;height:38px;padding:0!important;justify-content:center}.fab{right:18px;bottom:18px}.add-backdrop{align-items:flex-end}.add-modal{transform:none}}

/* v8.1 softer Done Today */
.done-today-soft{margin-top:10px;opacity:.82}
.done-today-soft .sh{font-size:10px;font-weight:600;color:var(--tt);letter-spacing:.07em;margin:14px 0 5px 4px}
.done-today-soft .dzone{background:transparent!important;box-shadow:none!important;border:1px solid var(--bd);border-radius:12px;overflow:visible;position:relative;z-index:2}
.done-today-soft .block{min-height:34px;padding:7px 12px;background:transparent!important;opacity:.72}

<script>
function todayKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
let TD=todayKey();
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MNS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DN=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DNS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const PC={high:'#eb5757',med:'#d9730d',low:'#0f7b6c'};
const PL={high:'High',med:'Medium',low:'Low'};

const SVG={
  'chevron-left':`<path d='M15 6l-6 6 6 6'/>`,

  'notes':`<path d='M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z'/><path d='M9 9h6M9 13h6M9 17h4'/>`,
  'grip':`<circle cx='9' cy='6' r='1.2' fill='currentColor' stroke='none'/><circle cx='9' cy='12' r='1.2' fill='currentColor' stroke='none'/><circle cx='9' cy='18' r='1.2' fill='currentColor' stroke='none'/><circle cx='15' cy='6' r='1.2' fill='currentColor' stroke='none'/><circle cx='15' cy='12' r='1.2' fill='currentColor' stroke='none'/><circle cx='15' cy='18' r='1.2' fill='currentColor' stroke='none'/>`,
  'dots':`<circle cx='5' cy='12' r='1.5' fill='currentColor' stroke='none'/><circle cx='12' cy='12' r='1.5' fill='currentColor' stroke='none'/><circle cx='19' cy='12' r='1.5' fill='currentColor' stroke='none'/>`,
  'pencil':`<path d='M4 20h4L18 8a2 2 0 0 0-4-4L4 16v4z'/><path d='M13.5 5.5l4 4'/>`,
  'square':`<rect x='4' y='4' width='16' height='16' rx='2'/>`,
  'calendar':`<rect x='4' y='5' width='16' height='16' rx='2'/><path d='M16 3v4M8 3v4M4 11h16'/>`,
  'arrow-left':`<path d='M5 12h14M5 12l6-6M5 12l6 6'/>`,
  'arrow-right':`<path d='M5 12h14M13 6l6 6-6 6'/>`,
  'trash':`<path d='M4 7h16M10 11v6M14 11v6M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-12'/><path d='M9 7V4h6v3'/>`,
  'x':`<path d='M18 6L6 18M6 6l12 12'/>`,
  'plus':`<path d='M12 5v14M5 12h14'/>`,
  'target':`<circle cx='12' cy='12' r='9'/><circle cx='12' cy='12' r='4'/><circle cx='12' cy='12' r='1' fill='currentColor' stroke='none'/>`,
  'download':`<path d='M12 3v12M8 11l4 4 4-4'/><path d='M3 19h18'/>`,
  'upload':`<path d='M12 21V9M8 13l4-4 4 4'/><path d='M3 5h18'/>`,
  'search':`<circle cx='11' cy='11' r='7'/><path d='M20 20l-3.5-3.5'/>`,
};
function ic(n,sz=14,st=''){
  return`<svg xmlns='http://www.w3.org/2000/svg' width='${sz}' height='${sz}' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' style='vertical-align:-2px;flex-shrink:0;${st}' aria-hidden='true'>${SVG[n]||''}</svg>`;
}

function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fd(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function ad(s,n){const d=pd(s);d.setDate(d.getDate()+n);return fd(d);}
function monOf(s){const d=pd(s);const v=d.getDay()||7;d.setDate(d.getDate()-v+1);return fd(d);}
function mk(s){return s.slice(0,7);}
function ec(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let D={tasks:{},dn:{},wn:{},wg:{},mg:{},mn:{},ui:{},recurring:[],review:{}};
let uid=0;const nid=()=>`${Date.now()}${++uid}`;
const tf=d=>D.tasks[d]||(D.tasks[d]=[]);
const gf=m=>D.mg[m]||(D.mg[m]=[]);
const wgf=w=>D.wg[w]||(D.wg[w]=[]);
function normalizeData(d){d.tasks=d.tasks||{};d.dn=d.dn||{};d.wn=d.wn||{};d.wg=d.wg||{};d.mg=d.mg||{};d.mn=d.mn||{};d.ui=d.ui||{};d.recurring=Array.isArray(d.recurring)?d.recurring:[];d.review=d.review||{};return d;}
function dayShort(s){const d=pd(s);return `${MNS[d.getMonth()]} ${d.getDate()}`;}
function allTasks(){return Object.keys(D.tasks||{}).flatMap(dt=>(D.tasks[dt]||[]).map(t=>({...t,date:dt})));}
let svt=null;
let editSt=null,menuSt=null,movePn=null,addSt=null;
let collapsed={}; // section collapse state, keyed by priority+context
let undoStack=[];
let lastDJson='';

function updateUndoBtn(){
  const b=document.getElementById('undoBtn');
  if(b)b.disabled=undoStack.length===0;
}
function undoLast(){
  const prev=undoStack.pop();
  if(!prev){updateUndoBtn();return;}
  try{D=normalizeData(JSON.parse(prev));}
  catch(e){updateUndoBtn();return;}
  lastDJson=JSON.stringify(D);
  try{if(window.storage)window.storage.set('pl3',lastDJson);}catch(e){}
  try{localStorage.setItem('pl3',lastDJson);}catch(e){}
  updateUndoBtn();re();showToast('Undone');
}

function dosave2(){
  const j=JSON.stringify(D);
  if(lastDJson && j!==lastDJson){undoStack.push(lastDJson);if(undoStack.length>25)undoStack.shift();}
  lastDJson=j;updateUndoBtn();
  try{if(window.storage)window.storage.set('pl3',j);}catch(e){}
  try{localStorage.setItem('pl3',j);}catch(e){}
  const el=document.getElementById('svind');
  if(el){el.style.opacity='1';clearTimeout(svt);svt=setTimeout(()=>el.style.opacity='0',2000);}
}

function carryForwardUnfinishedTasks(){
  const today=todayKey();
  D.tasks=D.tasks||{};
  const target=tf(today);
  let changed=false;

  Object.keys(D.tasks).sort().forEach(dt=>{
    if(dt>=today)return;
    const arr=D.tasks[dt]||[];
    if(!arr.length)return;

    const done=[];
    const unfinished=[];
    arr.forEach(t=>{
      if(t&&t.done)done.push(t);
      else if(t)unfinished.push(t);
    });

    if(unfinished.length){
      unfinished.forEach(t=>{t.carriedFrom=t.carriedFrom||dt;});
      target.push(...unfinished);
      D.tasks[dt]=done;
      changed=true;
    }
  });
  return changed;
}

function dailyMaintenance(render=true){
  const newToday=todayKey();
  const oldToday=TD;
  const dayChanged=newToday!==oldToday;

  if(dayChanged){
    TD=newToday;
    if(S.d===oldToday)S.d=TD;
    if(S.mv===mk(oldToday))S.mv=mk(TD);
  }

  const carried=carryForwardUnfinishedTasks();
  const rec=generateRecurringTasks();
  if(carried||rec)dosave2();
  if(render&&(dayChanged||carried||rec))re();
}

function showApp(){
  const ld=document.getElementById('ld'),pa=document.getElementById('pa');
  if(ld)ld.style.display='none';if(pa)pa.style.display='';
  try{dailyMaintenance(false);re();}catch(e){if(pa)pa.innerHTML='<p style="color:var(--dan);padding:1rem">Error.</p>';}
}
function tryLoad(){
  let done=false;
  const finish=()=>{if(!done){done=true;lastDJson=JSON.stringify(D);updateUndoBtn();showApp();}};
  setTimeout(finish,3000);
  try{
    if(window.storage){
      Promise.resolve(window.storage.get('pl3')).then(r=>{
        try{if(r&&r.value){const p=JSON.parse(r.value);D=normalizeData({tasks:{},dn:{},wn:{},wg:{},mg:{},mn:{},ui:{},recurring:[],review:{},...p});}}catch(e){}
        finish();
      }).catch(()=>{
        try{const r=localStorage.getItem('pl3');if(r)D=normalizeData({tasks:{},dn:{},wn:{},wg:{},mg:{},mn:{},ui:{},recurring:[],review:{},...JSON.parse(r)});}catch(e){}
        finish();
      });
    }else{
      try{const r=localStorage.getItem('pl3');if(r)D=normalizeData({tasks:{},dn:{},wn:{},wg:{},mg:{},mn:{},ui:{},recurring:[],review:{},...JSON.parse(r)});}catch(e){}
      finish();
    }
  }catch(e){finish();}
}

const S={v:'daily',d:TD,mv:mk(TD)};
function psv(v){
  S.v=v;menuSt=null;movePn=null;addSt=null;editSt=null;
  document.querySelectorAll('.tab').forEach(b=>b.className='tab'+(b.dataset.v===v?' on':''));
  ['vd','vw','vm'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById(v==='daily'?'vd':v==='weekly'?'vw':'vm').style.display='';
  re();
}
function re(){if(S.v==='daily')rd();else if(S.v==='weekly')rw();else rm();}

// ── Inline add: type + Enter, priority auto-inherited from section ──
function inlineAdd(e,type,ctx,p,key){
  if(e.key==='Enter'){
    e.preventDefault();
    const v=e.target.value.trim();
    e.target.value=''; // clear now so blur won't double-save
    if(v){
      if(type==='task')tf(ctx).push({id:nid(),text:v,priority:p,done:false});
      else if(type==='wg')wgf(ctx).push({id:nid(),text:v,priority:p||'med',done:false});
      else if(type==='mg')gf(ctx).push({id:nid(),text:v,done:false});
      dosave2();
    }
    addSt=null; setTimeout(re,0);
  }
  if(e.key==='Escape'){e.target.value='';addSt=null;re();}
}
// Save on blur (click anywhere else) — grab value immediately, re-render after event cycle
function blurSave(key,type,ctx,p){
  const el=document.getElementById('ai-'+key);
  const v=el?el.value.trim():'';
  if(v){
    if(type==='task')tf(ctx).push({id:nid(),text:v,priority:p,done:false});
    else if(type==='wg')wgf(ctx).push({id:nid(),text:v,priority:p||'med',done:false});
    else if(type==='mg')gf(ctx).push({id:nid(),text:v,done:false});
    dosave2();
  }
  addSt=null;
  setTimeout(re,0);
}
function addFH(key,p,type,ctx){
  const label=type==='task'?'task':'goal';
  if(addSt!==key)return`<button class="add-line" onclick="addSt='${key}';re()">${ic('plus',13,'color:var(--tt)')} New ${label}</button>`;
  const fakeCheck=`<span style="width:15px;height:15px;border:1.5px solid var(--bd2);border-radius:3px;flex-shrink:0;display:inline-block"></span>`;
  const prioTag=p?`<span class="ptag ${p}" style="opacity:.6">${PL[p]}</span>`:'';
  return`<div class="add-inline">
    <span style="width:18px;flex-shrink:0"></span>
    ${fakeCheck}
<input id="ai-${key}" spellcheck="true" autocapitalize="sentences" autocomplete="on" placeholder="Type and press Enter…" onkeydown="inlineAdd(event,'${type}','${ctx}','${p}','${key}')" onblur="blurSave('${key}','${type}','${ctx}','${p}')">
${prioTag}
  </div>`;
}
function focusAdd(key){setTimeout(()=>{const i=document.getElementById('ai-'+key);if(i)i.focus();},20);}

// Polished tooltip — theme-aware, fade-in, priority dot, stable positioning
const TPC={high:'#eb5757',med:'#d9730d',low:'#0f7b6c'};
let _tipHideTimer=null;
function showTip(e,text,prio){
  clearTimeout(_tipHideTimer);
  let tip=document.getElementById('_tip');
  if(!tip){tip=document.createElement('div');tip.id='_tip';document.body.appendChild(tip);}
  const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const dot=prio?`<span style="width:8px;height:8px;border-radius:50%;background:${TPC[prio]};flex-shrink:0;margin-top:4px;display:inline-block"></span>`:'';
  tip.innerHTML=`<div style="display:flex;align-items:flex-start;gap:7px">${dot}<span>${text}</span></div>`;
  tip.style.cssText=[
    'position:fixed',
    `background:${dark?'#2a2a2a':'#fff'}`,
    `color:${dark?'#e5e5e5':'#37352f'}`,
    `border:1px solid ${dark?'#444':'#e2e2e0'}`,
    'padding:8px 12px',
    'border-radius:8px',
    'font-size:13px',
    'font-weight:500',
    'line-height:1.5',
    'pointer-events:none',
    'z-index:9999',
    'max-width:240px',
    'white-space:normal',
    `box-shadow:${dark?'0 8px 24px rgba(0,0,0,.5)':'0 4px 20px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06)'}`,
    'opacity:0',
    'transition:opacity .15s ease',
    'display:block',
    'font-family:ui-sans-serif,system-ui,-apple-system,sans-serif'
  ].join(';');
  const r=e.currentTarget.getBoundingClientRect();
  // Position to the RIGHT of the card so moving cursor down doesn't dismiss it
  requestAnimationFrame(()=>{
    const tw=tip.offsetWidth,th=tip.offsetHeight;
    let left=r.right+8, top=r.top;
    // If goes off right edge, try left side
    if(left+tw>window.innerWidth-8) left=r.left-tw-8;
    // If still off screen (very narrow viewport), fall back to below
    if(left<8) left=r.left, top=r.bottom+6;
    // Clamp vertical
    if(top+th>window.innerHeight-8) top=window.innerHeight-th-8;
    if(top<8) top=8;
    tip.style.left=left+'px';
    tip.style.top=top+'px';
    tip.style.opacity='1';
  });
}
function hideTip(){
  // Small grace period — prevents flicker when cursor briefly leaves card
  _tipHideTimer=setTimeout(()=>{
    const t=document.getElementById('_tip');
    if(t){t.style.opacity='0';setTimeout(()=>{if(t)t.style.display='none';},150);}
  },80);
}

const DR={active:false,el:null,clone:null,data:null,oy:0,ox:0,drop:null};
function drS(e,data){
  if(e.button>0)return;e.preventDefault();e.stopPropagation();
  menuSt=null;movePn=null;
  const card=e.currentTarget.closest('[data-did]');if(!card)return;
  const r=card.getBoundingClientRect();
  DR.data=data;DR.el=card;DR.active=true;DR.oy=e.clientY-r.top;DR.ox=e.clientX-r.left;
  DR.clone=card.cloneNode(true);
  Object.assign(DR.clone.style,{position:'fixed',top:r.top+'px',left:r.left+'px',width:r.width+'px',zIndex:'9999',pointerEvents:'none',opacity:'.85',boxShadow:'0 8px 24px rgba(0,0,0,.12)',transform:'rotate(.5deg)',borderRadius:'4px',margin:'0',background:'var(--bg)'});
  document.body.appendChild(DR.clone);card.style.opacity='.2';
  window.addEventListener('pointermove',drM,{passive:false});window.addEventListener('pointerup',drU);window.addEventListener('pointercancel',drC);
}
function drM(e){
  if(!DR.active||!DR.clone)return;e.preventDefault();
  DR.clone.style.top=(e.clientY-DR.oy)+'px';DR.clone.style.left=(e.clientX-DR.ox)+'px';
  DR.clone.style.display='none';const un=document.elementFromPoint(e.clientX,e.clientY);DR.clone.style.display='';
  document.querySelectorAll('[data-did]').forEach(c=>{c.style.borderTop='';c.style.borderBottom='';});
  document.querySelectorAll('[data-zone]').forEach(z=>z.style.outline='');
  DR.drop=null;if(!un)return;
  const card=un.closest('[data-did]');const zone=un.closest('[data-zone]');
  if(card&&card.dataset.did!==DR.data.id){
    const cr=card.getBoundingClientRect();const bef=e.clientY<cr.top+cr.height/2;
    if(bef)card.style.borderTop='2px solid var(--inf)';else card.style.borderBottom='2px solid var(--inf)';
    DR.drop={type:'card',id:card.dataset.did,bef,prio:card.dataset.dprio,ctx:card.dataset.dctx};
  }else if(zone){
    zone.style.outline='2px dashed var(--inf)';
    DR.drop={type:'zone',prio:zone.dataset.zprio,ctx:zone.dataset.zctx};
  }
}
function drU(){
  const drop=DR.drop,data=DR.data;drC();if(!drop||!data)return;
  function move(arr,id){
    const fi=arr.findIndex(x=>x.id===id);if(fi<0)return;
    const[m]=arr.splice(fi,1);
    if(drop.type==='card'){if(drop.prio)m.priority=drop.prio;const ti=arr.findIndex(x=>x.id===drop.id);arr.splice(drop.bef?(ti<0?0:ti):(ti<0?arr.length:ti+1),0,m);}
    else{if(drop.prio)m.priority=drop.prio;const li=arr.reduce((a,x,i)=>x.priority===drop.prio?i:a,-1);arr.splice(li+1,0,m);}
  }
  if(data.kind==='task')move(tf(data.ctx),data.id);
  else if(data.kind==='wg')move(wgf(data.ctx),data.id);
  else if(data.kind==='mg')move(gf(data.ctx),data.id);
  dosave2();re();
}
function drC(){
  if(DR.clone)try{document.body.removeChild(DR.clone);}catch(e){}
  if(DR.el)DR.el.style.opacity='';
  document.querySelectorAll('[data-did]').forEach(c=>{c.style.borderTop='';c.style.borderBottom='';});
  document.querySelectorAll('[data-zone]').forEach(z=>z.style.outline='');
  DR.active=false;DR.clone=null;DR.el=null;DR.data=null;DR.drop=null;
  window.removeEventListener('pointermove',drM);window.removeEventListener('pointerup',drU);window.removeEventListener('pointercancel',drC);
}

function shouldCreateRecurring(r,today){
  if(!r||!r.text)return false; if(r.last===today)return false;
  if(!r.last)return true;
  const last=pd(r.last), now=pd(today); const diff=Math.floor((now-last)/86400000);
  if(r.freq==='daily')return diff>=1; if(r.freq==='weekly')return diff>=7; if(r.freq==='monthly')return now.getFullYear()>last.getFullYear()||now.getMonth()>last.getMonth(); return false;
}

  D.recurring.forEach(r=>{if(shouldCreateRecurring(r,today)){tf(today).push({id:nid(),text:r.text,priority:r.priority||'med',done:false,focus:!!r.focus,repeat:r.freq,repeatId:r.id});r.last=today;changed=true;}});
  return changed;
}

}

        ${gp.map(g=>gBlock(g,p,wk,'wg')).join('')}

  document.getElementById('vw').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">

          ${isCurrentWeek?`<span style="font-size:11px;font-weight:700;color:var(--inf);background:var(--inf-bg);padding:3px 9px;border-radius:20px;letter-spacing:.02em">This Week</span>`:''}
        </div>

  if(addSt)focusAdd(addSt);
}

function nm(n){const[y,m]=S.mv.split('-').map(Number),d=new Date(y,m-1+n,1);S.mv=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;addSt=null;editSt=null;re();}

// ── Export / Import

function exportData(){
  const json=JSON.stringify(D,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  D.ui=D.ui||{};D.ui.lastBackup=TD;try{localStorage.setItem('pl3',JSON.stringify(D));}catch(e){}
  a.download=`planner-backup-${TD}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
function mergePlannerData(imported){
  const incoming=normalizeData({tasks:{},dn:{},wn:{},wg:{},mg:{},mn:{},ui:{},recurring:[],review:{},...imported});
  D=normalizeData(D||{});
  let added=0;

  function sameItem(a,b){
    return String(a.text||'').trim()===String(b.text||'').trim()
      && String(a.priority||'')===String(b.priority||'')
      && !!a.done===!!b.done;
  }
  function mergeItemMap(section){
    Object.keys(incoming[section]||{}).forEach(key=>{
      const src=Array.isArray(incoming[section][key])?incoming[section][key]:[];
      const dst=Array.isArray(D[section][key])?D[section][key]:(D[section][key]=[]);
      src.forEach(item=>{
        if(!item||!String(item.text||'').trim())return;
        const exists=dst.some(x=>(item.id&&x.id===item.id)||sameItem(x,item));
        if(!exists){dst.push({...item,id:item.id||nid()});added++;}
      });
    });
  }
  function mergeNotes(section){
    Object.keys(incoming[section]||{}).forEach(key=>{
      const src=String(incoming[section][key]||'').trim();
      if(!src)return;
      const cur=String(D[section][key]||'').trim();
      if(!cur)D[section][key]=src;
      else if(cur!==src&&!cur.includes(src))D[section][key]=cur+'\n\nImported note:\n'+src;
    });
  }

  mergeItemMap('tasks');
  mergeItemMap('wg');
  mergeItemMap('mg');
  mergeNotes('dn');
  mergeNotes('wn');
  mergeNotes('mn');

  const recDst=Array.isArray(D.recurring)?D.recurring:(D.recurring=[]);
  (incoming.recurring||[]).forEach(r=>{
    if(!r||!String(r.text||'').trim())return;
    const exists=recDst.some(x=>(r.id&&x.id===r.id)||(String(x.text||'').trim()===String(r.text||'').trim()&&x.freq===r.freq));
    if(!exists){recDst.push({...r,id:r.id||nid()});added++;}
  });

  D.review={...(incoming.review||{}),...(D.review||{})};
  D.ui={...(incoming.ui||{}),...(D.ui||{})};
  return added;
}
function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result);
        if(typeof p!=='object'||Array.isArray(p))throw new Error();
        const added=mergePlannerData(p);
        dailyMaintenance(false);
        dosave2();re();
        showToast(added>0?`✓ Imported ${added} new item${added===1?'':'s'}`:'✓ Import complete — no duplicates added');
      }catch{showToast('⚠ Invalid file');}
    };
    reader.readAsText(file);
  };
  input.click();
}
function showToast(msg){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;z-index:9999;pointer-events:none;transition:opacity .3s;font-family:'+document.body.style.fontFamily;
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2200);
}

// Theme toggle
let _theme = localStorage.getItem('pl_theme') || 'auto';
function applyTheme(){
  const root = document.documentElement;
  const btn = document.getElementById('themeBtn');
  const ico = document.getElementById('themeIco');
  if(_theme==='dark'){
    root.style.setProperty('color-scheme','dark');
    root.classList.add('force-dark');
    if(ico) ico.textContent='☀️';
    if(btn) btn.title='Switch to light';
  } else if(_theme==='light'){
    root.style.setProperty('color-scheme','light');
    root.classList.remove('force-dark');
    if(ico) ico.textContent='🌙';
    if(btn) btn.title='Switch to dark';
  } else {
    root.style.removeProperty('color-scheme');
    root.classList.remove('force-dark');
    const sysDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
    if(ico) ico.textContent = sysDark ? '☀️' : '🌙';
    if(btn) btn.title = sysDark ? 'Switch to light' : 'Switch to dark';
  }
}
function toggleTheme(){
  const sysDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const currentlyDark = _theme==='dark' || (_theme==='auto' && sysDark);
  _theme = currentlyDark ? 'light' : 'dark';
  localStorage.setItem('pl_theme', _theme);
